name: Process LJSpeech Dataset

on:
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  process-dataset:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies (libsndfile)
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install datasets huggingface_hub soundfile torchcodec librosa torch

      - name: Run LJSpeech Extraction and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python extract_ljspeech.py
